<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>47NEWS速報</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 10px; background: transparent; color: #374151; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { padding: 8px 0; border-bottom: 1px dashed rgba(0, 0, 0, 0.05); font-size: 14px; }
    a { color: #374151; text-decoration: none; display: block; }
    a:hover { color: #0284c7; text-decoration: underline; }
  </style>
</head>
<body>
  <ul id="news-list">
    <li>ニュースを読み込み中...</li>
  </ul>

  <script>
    (async function() {
      try {
        // 同じGitHub内にあるXMLを読み込むので、セキュリティ（CORS）エラーが絶対に起きません！
        const response = await fetch('./feed.xml');
        const xmlText = await response.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
        const items = xmlDoc.getElementsByTagName('item');
        
        let html = '';
        const count = Math.min(items.length, 8);
        for (let i = 0; i < count; i++) {
          const title = items[i].getElementsByTagName('title')[0].textContent;
          const link = items[i].getElementsByTagName('link')[0].textContent;
          html += `<li><a href="${link}" target="_blank" rel="noopener">${title}</a></li>`;
        }
        document.getElementById('news-list').innerHTML = html;
      } catch (e) {
        document.getElementById('news-list').innerHTML = '<li>ニュースの読み込みに失敗しました</li>';
      }
    })();
  </script>
</body>
</html>
